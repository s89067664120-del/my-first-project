<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфолио — Софья Буланова</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
      top: -150px; left: -150px;
    }
    .glow-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, transparent 70%);
      bottom: -100px; right: -100px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 480px;
      width: calc(100% - 32px);
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 0 0 1px rgba(139,92,246,0.1), 0 32px 80px rgba(0,0,0,0.6);
      animation: card-in 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #7c3aed, #ec4899, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 32px rgba(139,92,246,0.5);
      animation: avatar-pulse 3s ease-in-out infinite;
    }
    @keyframes avatar-pulse {
      0%, 100% { box-shadow: 0 0 32px rgba(139,92,246,0.5); }
      50%       { box-shadow: 0 0 52px rgba(236,72,153,0.6); }
    }

    .name {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, #c084fc 40%, #ec4899 70%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: gradient-shift 6s ease infinite;
      margin-bottom: 8px;
    }
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 36px;
    }

    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, #7c3aed, #ec4899, transparent);
      margin: 0 auto 36px;
      border-radius: 2px;
    }

    .projects-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 16px;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 36px;
    }

    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: #fff;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .project-link:hover {
      background: rgba(124,58,237,0.12);
      border-color: rgba(124,58,237,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }

    .project-info { text-align: left; }
    .project-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .project-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    .arrow {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: rgba(124,58,237,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .project-link:hover .arrow { background: rgba(124,58,237,0.4); }
    .arrow svg { width: 16px; height: 16px; color: #a78bfa; }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    }
    .contact-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 12px 40px rgba(124,58,237,0.55);
    }
    .contact-btn svg { width: 16px; height: 16px; }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
    }

    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
</head>
<body>

  <div class="glow-orb glow-orb-2"></div>

    <div class="divider"></div>

    <p class="projects-label">Мои работы</p>

    <div class="projects">

      <a href="vizitka.html" class="project-link">

      <a href="vizitka2.html" class="project-link">

        </div>
        <div class="arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </a>

      <a href="landing.html" class="project-link">
        <div class="project-info">

        <div class="arrow">

            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </a>

    </div>

    <a href="https://t.me/S_89067664120" target="_blank" rel="noopener" class="contact-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Написать мне
    </a>

    <p class="footer">© 2026 Sofya Bulanova</p>

  </div>

</body>
</html>
